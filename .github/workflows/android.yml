name: Ownkey Android CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/FUNDING.yml"
      - ".dockerignore"
      - ".editorconfig"
      - "fastlane/**"
      - "AI_POLICY.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"
      - "ROADMAP.md"
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: "APK build type"
        required: false
        default: "debug"
        type: choice
        options:
          - debug
          - beta
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.0.2

      - name: Resolve build task
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
          else
            BUILD_TYPE="debug"
          fi

          BUILD_TYPE="${BUILD_TYPE,,}"
          BUILD_TYPE_CAP="${BUILD_TYPE^}"
          GRADLE_TASK="assemble${BUILD_TYPE_CAP}"

          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "gradle_task=${GRADLE_TASK}" >> "$GITHUB_OUTPUT"
          echo "Selected Gradle task: ${GRADLE_TASK}"

      - name: Build APK with Gradle
        run: ./gradlew clean ${{ steps.vars.outputs.gradle_task }} --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ownkey-${{ steps.vars.outputs.build_type }}-apk
          path: |
            app/build/outputs/apk/${{ steps.vars.outputs.build_type }}/*.apk
            app/build/outputs/apk/${{ steps.vars.outputs.build_type }}/output-metadata.json
          if-no-files-found: error
