name: Ownkey Android CI

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/FUNDING.yml"
      - ".dockerignore"
      - ".editorconfig"
      - "fastlane/**"
      - "AI_POLICY.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"
      - "ROADMAP.md"
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: "APK build type"
        required: false
        default: "release"
        type: choice
        options:
          - debug
          - beta
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.0.2

      - name: Resolve build tasks
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            BUILD_TYPE="release"
          else
            BUILD_TYPE="debug"
          fi

          BUILD_TYPE="${BUILD_TYPE,,}"
          BUILD_TYPE_CAP="${BUILD_TYPE^}"
          APK_TASK="assemble${BUILD_TYPE_CAP}"

          if [[ "${BUILD_TYPE}" == "release" ]]; then
            BUNDLE_TASK="bundleRelease"
          else
            BUNDLE_TASK=""
          fi

          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "apk_task=${APK_TASK}" >> "$GITHUB_OUTPUT"
          echo "bundle_task=${BUNDLE_TASK}" >> "$GITHUB_OUTPUT"
          echo "Selected APK task: ${APK_TASK}"
          if [[ -n "${BUNDLE_TASK}" ]]; then
            echo "Selected AAB task: ${BUNDLE_TASK}"
          fi

      - name: Build APK with Gradle
        run: ./gradlew clean ${{ steps.vars.outputs.apk_task }} --stacktrace

      - name: Build release AAB
        if: ${{ steps.vars.outputs.bundle_task != '' }}
        run: ./gradlew ${{ steps.vars.outputs.bundle_task }} --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ownkey-${{ steps.vars.outputs.build_type }}-apk
          path: |
            app/build/outputs/apk/${{ steps.vars.outputs.build_type }}/*.apk
            app/build/outputs/apk/${{ steps.vars.outputs.build_type }}/output-metadata.json
          if-no-files-found: error

      - name: Upload release AAB artifact
        if: ${{ steps.vars.outputs.bundle_task != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ownkey-release-aab
          path: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/bundle/release/output-metadata.json
          if-no-files-found: error

      - name: Publish GitHub release assets (tag builds)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
